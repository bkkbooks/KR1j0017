body:
  text: 急就篇急就篇急就奇觚與衆異羅列諸物名姓字分別部居不雜廁用日約少誠快意勉力務之必有喜請道其章宋延年鄭子方衛益壽史步昌周千秋趙孺卿爰展世高辟兵鄧萬歲秦妙房郝利親馮漢強戴護郡景君明董奉德桓賢良任逢時侯仲郎由廣國榮惠常烏承祿令狐橫朱交便孔何傷師猛虎石敢當所不侵龍未央伊嬰齊翟回慶畢稚季昭小兄柳堯舜樂禹湯淳于登費通光柘溫舒路政陽霍聖宮顏文章管財智偏呂張魯賀喜觀宜王程忠信吳仲皇許終古賈友倉陳元始韓魏唐液容調柏杜楊曹富貴尹李桑蕭彭祖屈宗談樊愛君崔孝讓姚得賜燕楚莊薛勝客聶干將求男弟過説長祝恭敬審毋妨龐賞贛來士梁成博好范建羌閰歡欣寧可忘苟貞夫苖涉臧田細兒謝內黃柴桂林溫直衡奚驕叔邴勝箱雍弘敞劉若芳毛遺羽馬牛羊尚次倩丘則剛陰賓上翠鴛鴦庶霸遂萭段卿泠幼功武初昌褚回池蘭偉房減罷軍橋竇陽原輔輻宣棄奴殷滿息充申屠夏修俠公孫都慈仁他郭破胡虞尊偃憲義渠蔡遊威左地餘談平定孟伯徐葛轗軻敦倚蘇耿潘扈焦滅胡晏奇能邢麗奢邵守實宰安期俠卻敵代焉于司馬褒尚自於陶熊羆解莫如樂欣諧童扶疏痛無忌向夷吾閎并欣竺諫朝續增紀遺失餘姓名訖請言物錦繡縵䋃離雲爵乘風縣鐘華洞樂豹首落莫兔雙鶴春草雞翹鳧翁濯鬱金半見緗白䋤縹綟緑紈皂紫硟蒸栗絹紺縉紅繎青綺綾縠靡潤鮮綈絡縑練素帛蟬絳緹絓紬絲絮綿㠲敝囊橐不直錢服瑣緰㠿與繒連貰貸賣買販肆便資貨市贏匹幅全綌紵枲縕裹約纏綸組縌綬以高遷量丈尺寸斤兩銓取受付豫相因緣稻黍秫稷粟麻粳餅餌麥飯甘豆羹葵韭蔥薤蓼蘇薑蕪荑鹽豉醯酢醬藝蒜薺芥茱萸香老菁蘘荷冬日藏梨柿奈桃待露霜棘杏瓜棣饊飴餳園菜果蓏助米糧甘麮殊美奏諸君袍襦表裏曲領裙襜褕夾復褶袴褌褌衣蔽膝布母繜針縷補縫綻紩緣履舄鞜襞䋐縀紃靸鞮卬角褐襪巾裳韋不借為牧人完堅耐事踰比倫屐屩縶粗羸寠貧旃裘𩌈𩍜蠻夷氏去俗歸義來附親譯導贊拜稱妾臣戎伯總閲什伍鄰稟食縣官帶金銀鐵鈇鑽錐釜鍑鍪鍛鑄鉛錫鐙錠鐎鈐䥦鉤銍斧鑿鉏銅鍾鼎鋞鋗鉇銚釭鐧鍵鉆冶錮鐈竹器簦笠簟籧篨囤篅箯筥䉛箅篝篩箄箕帚筐篋簍橢杅槃案杯閜碗蠡升參升半巵觛槫榼椑榹匕箸籫甀缶盆盎甕罃壺甑瓽甂甌瓨罌盧纍繘繩索絞紡纑簡札檢署槧牘家板柞所産谷口斜水蟲科斗蛙蝦蟆鯉鮒蟹鱓鮐鮑蝦妻婦聘嫁齎媵僮奴婢私隸枕床杠蒲蒻藺席帳帷幢承塵戶簾絛繢總鏡奩疏比各異工芬薰脂粉膏澤筒沐浴揃摵寡合同襐飾刻畫無等雙係臂琅玕虎魄龍璧碧珠璣玫瑰甕玉玦環佩靡從容射鬾辟邪除群凶竽瑟空侯琴築箏鐘磬鞀簫鼙鼓鳴五音揔會歌謳聲倡優俳笑觀倚庭侍酒行觴宿昔酲廚宰切割給使令薪炭萑葦炊孰生膹膾炙胾各有形酸醎酢淡辨濁清肌䐞脯臘魚臭腥酤酒釀醪稽極程棊局博戲相易輕冠幘簪簧結髮紐頭額頞䪼眉目耳鼻口脣舌齗牙齒頰頤頸項肩臂肘捲捥節瓜拇指手胂腴胸脅喉咽髃腸胃腹肝肺心主脾腎五藏膍齊乳尻髖脊膂腰背呂股腳膝臏脛為柱膞踝跟踵相近聚矛鋋鑲盾刃刀鉤鈒戟鈹鎔劍鐔鍭弓弩箭矢鎧兜鉾鐵錘檛杖梲柲殳輜軺轅軸輿輪𨎍輻轂輨轄輮䡻䡦軹軾軫軨轙軜衡蓋轑俾倪枙縳棠轡勒鞅韅靽羈韁鞇鞴靯𩍿鞍鑣鐊靳靷䩸䩞色焜煌革轖髤漆油黑蒼室宅廬舍樓殿堂門戶井竈廡囷京榱椽欂櫨瓦屋梁泥塗堊塈壁垣墻幹楨板栽度圜方墼壘廥廄庫東箱屏廁清溷糞土壤碓磑扇隤舂簸揚頃町界畝畦埒封疆畔畷伯耒犂鋤種樹收斂賦稅租捃穫秉把插捌杷桐梓樅松榆椿樗槐檀荊棘葉枝扶騂騩騅駮驪騮驢騏駹馳驟怒步超牂羖羯羠䍮羝羭六畜蕃息豚豕豬豭豶狡犬野雞雛犙牬特犗羔犢駒雄雌牝牡相隨趨糟粳汁滓稿莝芻鳳爵鴻鵠鴈鶩雉鷹鷂鴇鴰翳雕尾鳩鴿鶉鴳中網死鳶鵲鴟梟驚相視豹狐距虛豺犀兕貍兔飛鼯狼麋麂麇麈麖麀皮給履寒氣泄注腹臚脹痂疕疥癘癡聾盲癰疽瘛瘲痿痹脹疝瘕顛疾狂失響瘧瘚瘀痛瘼溫病消渴歐逆咳懘讓疸熱瘻痔眵䁾䀶篤癃衰廢迎醫匠灸刺和藥逐去邪黃芩伏苓礜茈胡牡蒙甘草菀藜蘆烏喙附子椒芫華半夏皂莢艾橐吾芎藭厚朴桂栝樓款東貝母薑狼牙遠志續斷參土瓜亭歷桔梗龜骨枯雷矢雚菌藎兔盧卜問譴祟父母恐祠祀社稷叢臘奉謁禓塞禱鬼神寵棺槨槥櫝遣送踊喪弔悲哀面目腫哭泣祭醊墳墓冢諸物盡訖五官出宦學諷詩孝經論春秋尚書律令文治禮掌故砥厲身智能通達多見聞名顯絶殊異等倫抽擢推舉白黑分迹行上究為貴人丞相御史郎中君進近公卿傅僕勳前後常侍諸將軍列侯封邑有土臣積學所致非鬼神馮翊京兆執治民廉潔平端撫順親姦邪並塞皆理馴變化迷惑別故新更卒歸誠自詣因司農少府國之淵遠取財物主平均皋陶造獄法律存誅罰詐偽劾罪人廷尉正監承古先揔領煩亂決疑文變鬭殺傷捕伍鄰亭長遊徼共雜診盜賊繫囚榜笞臀朋黨謀敗相引牽欺誣詰狀還反真坐生患害不足憐辭窮情得具獄堅籍受證驗記問年閭里鄉縣趣辟論鬼薪白粲鉗釱髡不肯謹慎自令然輸屬詔作溪谷山箛篍起居課後先斬伐材木斫株根犯禍事危置對曹謾訑首匿愁勿聊縛束脫漏亡命流攻擊劫奪檻車膠嗇夫假佐扶致牢疻痏保辜謕呼號乏興猥逮詗讂求輒覺沒入檄報留受賕枉法忿怒仇讒諛爭語相抵觸憂念緩急悍勇獨乃肯省察諷諫讀涇水注渭街術曲筆研籌算膏火燭賴赦救解貶秩祿邯鄲河間沛巴蜀潁川臨淮集課録依溷汙染貪者辱漢地廣大無不容盛萬方來朝臣妾使令邊境無事中國安寧百姓承德陰陽和平風雨時節莫不滋榮災蝗不起五穀孰成賢聖並進博士先生長樂無極老復丁
